<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta name="referrer" content="no-referrer">
    <title>Connecting Roblox | Fima Macro</title>
    <link rel="icon" href="/assets/images/fima-logo.png?v=20260526-2" type="image/png">
    <style>
      :root {
        --bg: #05030b;
        --panel: rgba(18, 10, 32, 0.88);
        --panel-2: rgba(35, 16, 56, 0.75);
        --text: #f7f1ff;
        --muted: #b8aac9;
        --accent: #b277ff;
        --cyan: #48d9ff;
        --danger: #ff4d86;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(178, 119, 255, 0.28), transparent 34rem),
          radial-gradient(circle at 80% 70%, rgba(72, 217, 255, 0.18), transparent 30rem),
          linear-gradient(135deg, #05030b 0%, #0c0615 48%, #07131a 100%);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at center, black 0, transparent 75%);
        pointer-events: none;
      }

      .card {
        position: relative;
        width: min(92vw, 560px);
        padding: 34px;
        border: 1px solid rgba(178, 119, 255, 0.38);
        border-radius: 18px;
        background: linear-gradient(145deg, var(--panel), var(--panel-2));
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5), 0 0 42px rgba(178, 119, 255, 0.18);
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent, rgba(72, 217, 255, 0.08), transparent);
        transform: translateX(-100%);
        animation: sweep 2.8s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes sweep {
        0%, 30% { transform: translateX(-100%); }
        70%, 100% { transform: translateX(100%); }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }

      .brand img {
        width: 44px;
        height: 44px;
        object-fit: contain;
        filter: drop-shadow(0 0 16px rgba(178, 119, 255, 0.45));
      }

      .brand strong {
        font-weight: 900;
        letter-spacing: 0;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 12px;
        font-size: clamp(34px, 8vw, 52px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .status {
        margin-top: 26px;
        padding: 16px;
        border: 1px solid rgba(178, 119, 255, 0.28);
        border-radius: 12px;
        background: rgba(5, 3, 11, 0.62);
        color: var(--text);
        font-weight: 800;
      }

      .status.error {
        border-color: rgba(255, 77, 134, 0.62);
        color: var(--danger);
      }

      .loader {
        width: 100%;
        height: 6px;
        margin-top: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .loader span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--cyan));
        animation: load 1.15s ease-in-out infinite alternate;
      }

      @keyframes load {
        from { transform: translateX(-22%); }
        to { transform: translateX(160%); }
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 1px solid rgba(178, 119, 255, 0.34);
        border-radius: 10px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        text-decoration: none;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="/assets/images/fima-logo.png?v=20260526-2" alt="">
        <strong>Fima Macro</strong>
      </div>
      <div class="eyebrow">Roblox account link</div>
      <h1>Connecting Roblox.</h1>
      <p>Keep this tab open for a moment while we securely finish the Roblox account link.</p>
      <div class="status" id="status">Checking Roblox callback...</div>
      <div class="loader" id="loader"><span></span></div>
      <div class="actions">
        <a href="/dashboard/overview">Back to dashboard</a>
        <a href="/support">Support</a>
      </div>
    </main>

    <script src="/assets/js/config.js?v=20260526-9"></script>
    <script>
      const statusEl = document.getElementById("status");
      const loaderEl = document.getElementById("loader");
      const apiBase = (window.FIMA_API_BASE_URL || "https://api.fimamacro.com").replace(/\/+$/, "");

      function fail(message) {
        statusEl.textContent = message;
        statusEl.classList.add("error");
        loaderEl.style.display = "none";
      }

      async function finish() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code") || "";
        const state = params.get("state") || "";
        const error = params.get("error") || "";

        if (error) {
          fail("Roblox cancelled or rejected the authorization.");
          return;
        }

        if (!code || !state) {
          fail("Roblox callback is missing required data.");
          return;
        }

        statusEl.textContent = "Finishing secure account link...";

        try {
          const response = await fetch(`${apiBase}/auth/roblox/finish`, {
            method: "POST",
            credentials: "include",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ code, state })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data.success) {
            throw new Error(data.error || "roblox_oauth_failed");
          }
          statusEl.textContent = "Roblox linked. Redirecting...";
          window.location.replace(data.redirectUrl || "/dashboard/overview?roblox=connected");
        } catch (err) {
          fail("Roblox could not be linked. Please log in again and retry from the dashboard.");
        }
      }

      finish();
    </script>
  </body>
</html>
